version: "3.9"

# Reference deployment (not needed for the demo — demo uses in-memory Qdrant)
# Use this for a persistent production-like setup.
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v

services:
  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  qdrant_data:
  redis_data:
